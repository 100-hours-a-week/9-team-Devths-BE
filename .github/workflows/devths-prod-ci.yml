name: Devths-BE 운영용 CI 파이프라인

# main 브랜치만 진행
on:
  push:
    branches:
      - main

# 동시성 제어: 동일한 브랜치에 새로운 커밋이 오면 이전 워크플로우 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ENV 설정
env:
  JAVA_VERSION: "21"
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ github.ref_name == 'main' && secrets.AWS_S3_BUCKET_PROD || secrets.AWS_S3_BUCKET }}
  S3_PREFIX: BE/${{ github.ref_name }}
  CODEDEPLOY_APPLICATION: ${{ secrets.CODEDEPLOY_APPLICATION }}
  # 브랜치별 배포 그룹 이름 분기 (main=Devths-V1-BE-PROD-Group, release/*=Devths-V1-BE-STAGING-Group, develop=Devths-V1-BE-Dev-Group)
  CODE_DEPLOY_GROUP_NAME: ${{ github.ref_name == 'main' && secrets.CODE_DEPLOY_GROUP_NAME_PROD || (startsWith(github.ref_name, 'release/') && secrets.CODE_DEPLOY_GROUP_NAME_STAGING || secrets.CODE_DEPLOY_GROUP_NAME_DEV) }}

jobs:
  # Lint 설정
  lint:
    name: lint
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      checks: write
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 및 Gradle 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Lint (CheckStyle) 수행
        run: ./gradlew checkstyleMain

      - name: Lint (CheckStyle) 결과 리포트
        uses: lcollins/checkstyle-github-action@v2.0.0
        if: always()
        with:
          path: '**/build/reports/checkstyle/*.xml'
          title: 'Checkstyle 결과 Report'

  # CodeQL 기반 코드 정적 분석 실행
  build_and_analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: true  # 정적 분석 실패 시 즉시 중단
      matrix:
        language: [ java-kotlin ]

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 및 Gradle 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: CodeQL 초기화
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: "./.github/codeql/code-ql-heavy.yml"

      - name: Build (Gradle)
        run: |
          chmod +x gradlew
          ./gradlew build -x test -x check

      - name: CodeQL 분석 수행
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: 보안 취약점 결과 확인 및 차단
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "⏳ 분석 결과가 GitHub에 반영되기를 기다리는 중 (10초)..."
          sleep 10
          
          # 1. 현재 이벤트가 push인지 pr인지에 따라 검색할 REF 설정
          # GITHUB_REF는 push일 땐 refs/heads/branch명, PR일 땐 refs/pull/번호/merge가 됩니다.
          CURRENT_REF="${{ github.ref }}"
          echo "📍 현재 Ref: $CURRENT_REF"
          
          # 2. API 호출하여 High/Critical 등급의 Open 상태인 알림 조회
          ALERTS=$(gh api "repos/${{ github.repository }}/code-scanning/alerts?tool_name=CodeQL&state=open&ref=$CURRENT_REF" \
            --jq '[.[] | select(.rule.security_severity_level == "high" or .rule.security_severity_level == "critical")]')
          
          COUNT=$(echo "$ALERTS" | jq 'length')
          
          if [ "$COUNT" -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ 보안 검사 실패: 고위험(High/Critical) 취약점 $COUNT개 발견"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "$ALERTS" | jq -r '.[] | "- [\(.rule.security_severity_level)] \(.rule.description) \n   위치: \(.most_recent_instance.location.path)"'
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ 보안 검사 통과: 현재 커밋($CURRENT_REF)은 안전합니다."
          fi

      - name: 빌드 아티팩트 저장
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar
          retention-days: 1

  # 추후 통합 테스트 과정 추가 예정

  # S3 업로드
  s3-upload:
    name: s3-upload
    runs-on: ubuntu-22.04
    needs: [ lint, build_and_analyze ] # 테스트 통과 후 빌드 및 S3 업로드
    if: success()
    outputs:
      s3_key: ${{ steps.s3-upload.outputs.s3_key }}
      version_name: ${{ steps.package.outputs.version_name }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_KEY}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: 배포 패키지 생성 (JAR + Scripts)
        id: package
        run: |
          set -euo pipefail

          # 1. 버전 정보 생성
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          VERSION_NAME="$(date +'%Y%m%d_%H%M%S')-$SHORT_SHA"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

          # 2. 실행 가능한 JAR 파일 찾기 및 이름 고정
          ORIGINAL_JAR=$(ls build/libs/*.jar | grep -v 'plain' | head -n 1)
          if [ -z "$ORIGINAL_JAR" ]; then
            echo "❌ 실행 가능한 JAR 파일을 찾을 수 없습니다."
            exit 1
          fi
          
          # 3. 배포용 디렉토리 구성
          mkdir -p deploy-package
          cp "$ORIGINAL_JAR" "deploy-package/application.jar"
          
          # 4. appspec.yml 및 scripts 복사 (존재할 경우)
          if [ -f "appspec.yml" ]; then
            cp appspec.yml deploy-package/
          else
            echo "⚠️ appspec.yml이 없습니다. CodeDeploy 실패 가능성이 있습니다."
          fi

          if [ -d "scripts" ]; then
            cp -r scripts deploy-package/
          else
            echo "⚠️ scripts 디렉토리가 없습니다."
          fi

          # 6. ZIP 압축
          cd deploy-package
          zip -r "../$VERSION_NAME.zip" ./*
          cd ..
          
          echo "📦 배포 패키지 생성 완료: $VERSION_NAME.zip"
          ls -lh "$VERSION_NAME.zip"

      - name: S3로 배포 패키지 업로드
        id: s3-upload
        run: |
          VERSION_NAME="${{ steps.package.outputs.version_name }}"
          DEST="s3://${S3_BUCKET}/${S3_PREFIX}"
          S3_KEY="${S3_PREFIX}/$VERSION_NAME.zip"

          echo "🚀 Uploading $VERSION_NAME.zip to $DEST"
          aws s3 cp "$VERSION_NAME.zip" "$DEST/$VERSION_NAME.zip" --only-show-errors

          # GITHUB_OUTPUT에 S3 Key 기록 (모든 브랜치에서 공통)
          echo "s3_key=$S3_KEY" >> $GITHUB_OUTPUT
          echo "📂 S3 Key: $S3_KEY"

  # CodeDeploy 트리거 (develop/release만)
  codedeploy:
    name: codedeploy
    runs-on: ubuntu-22.04
    needs: [ s3-upload ]
    if: success() && github.ref_name != 'main' # 운영(main)은 제외하고, develop/release만 자동 배포
    outputs:
      deployment_id: ${{ steps.codedeploy.outputs.deployment_id }}

    steps:
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_KEY}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: AWS CodeDeploy 배포 요청
        id: codedeploy
        run: |
          VERSION_NAME="${{ needs.s3-upload.outputs.version_name }}"
          S3_KEY="${{ needs.s3-upload.outputs.s3_key }}"

          echo "🚀 CodeDeploy 배포 생성 요청..."
          aws deploy create-deployment \
            --application-name ${{ env.CODEDEPLOY_APPLICATION }} \
            --deployment-config-name CodeDeployDefault.AllAtOnce \
            --deployment-group-name ${{ env.CODE_DEPLOY_GROUP_NAME }} \
            --s3-location bucket=${S3_BUCKET},bundleType=zip,key=$S3_KEY \
            --description "Deployed via GitHub Actions: $VERSION_NAME" \
            --output json > deployment_output.json

          DEPLOYMENT_ID=$(jq -r '.deploymentId' deployment_output.json)

          # GITHUB_OUTPUT에 값 기록
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

          echo "🚀 Deployment ID: $DEPLOYMENT_ID"

  # CI 단계 Discord 알림 (Build & S3 Upload)
  notify-ci:
    name: notify-ci
    runs-on: ubuntu-22.04
    needs: [ lint, build_and_analyze, s3-upload ]
    if: always()
    steps:
      - name: 데이터 준비
        id: prep
        env:
          USER_MAP: ${{ secrets.USER_MAP_JSON }}
        run: |
          # 1. 커밋 메시지 추출
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          echo "title=$COMMIT_MSG" >> $GITHUB_OUTPUT

          # 2. 브랜치 정보
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Discord 빌드 알림
        uses: sarisia/actions-status-discord@v1
        with:
          status: ${{ (needs.lint.result == 'success' && needs.build_and_analyze.result == 'success' && needs.s3-upload.result == 'success') && 'success' || 'failure' }}
          # 타겟 브랜치에 따른 웹훅 분기
          webhook: ${{ github.ref_name == 'main' && secrets.DISCORD_WEBHOOK_PROD_URL || secrets.DISCORD_WEBHOOK_NON_PROD_URL }}
          title: "배포(CI) 결과 [${{ (needs.lint.result == 'success' && needs.build_and_analyze.result == 'success' && needs.s3-upload.result == 'success') && '✅성공' || '❌실패' }}]"
          description: |
            **커밋 메시지**: ${{ steps.prep.outputs.title }}
            **브랜치**: `${{ steps.prep.outputs.branch }}`
            **환경**: ${{ github.ref_name == 'main' && '🚀 운영(PROD)' || (startsWith(github.ref_name, 'release/') && '🧪 스테이징(STAGING)' || '🛠️ 개발(DEV)') }}

            **📊 상세 결과**:
            - Lint: ${{ needs.lint.result == 'success' && '✅' || '❌' }}
            - Static Analysis: ${{ needs.build_and_analyze.result == 'success' && '✅' || '❌' }}
            - S3 Upload: ${{ needs.s3-upload.result == 'success' && '✅' || '❌' }}

            ${{ needs.build_and_analyze.result != 'success' && '⚠️ **정적 분석 실패로 인해 빌드가 중단되었습니다.**' || '' }}
            **📂 S3 Key**: `${{ needs.s3-upload.outputs.s3_key }}`
            **🔗 링크**: [커밋 확인하기](${{ github.event.repository.html_url }}/commit/${{ github.sha }})

          color: "${{ (needs.lint.result == 'success' && needs.build_and_analyze.result == 'success' && needs.s3-upload.result == 'success') && 65280 || 16711680 }}"
          username: GitHub Merge Bot
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

  # CD 단계 알림 (CodeDeploy Result) - develop/release만
  notify-cd:
    name: notify-cd
    runs-on: ubuntu-22.04
    needs: [ codedeploy ]
    if: always() && github.ref_name != 'main'
    steps:
      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_KEY}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: CodeDeploy 완료 대기 및 결과 조회
        id: cd-check
        run: |
          DEPLOYMENT_ID="${{ needs.codedeploy.outputs.deployment_id }}"
          echo "⏳ Waiting for CodeDeploy ($DEPLOYMENT_ID)..."
          
          # 배포 완료 대기
          aws deploy wait deployment-successful --deployment-id $DEPLOYMENT_ID || true
          
          # 상태 조회
          STATUS=$(aws deploy get-deployment --deployment-id $DEPLOYMENT_ID --query "deploymentInfo.status" --output text)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          
          if [ "$STATUS" == "Succeeded" ]; then
             echo "✅ 배포 성공"
          else
             echo "❌ 배포 실패"
          fi
          
          # Lifecycle Event 상세 조회 (단일 인스턴스 기준)
          INSTANCE_ID=$(aws deploy list-deployment-instances --deployment-id $DEPLOYMENT_ID --query "instancesList[0]" --output text)
          
          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            EVENTS=$(aws deploy get-deployment-instance --deployment-id $DEPLOYMENT_ID --instance-id $INSTANCE_ID --query "instanceSummary.lifecycleEvents")
          
            # 각 단계별 상태 추출 (Succeeded, Failed, Skipped, Pending, Unknown)
            STATUS_DOWNLOAD=$(echo $EVENTS | jq -r '.[] | select(.lifecycleEventName=="DownloadBundle") | .status')
            STATUS_APP_START=$(echo $EVENTS | jq -r '.[] | select(.lifecycleEventName=="ApplicationStart") | .status')
            STATUS_VALIDATE=$(echo $EVENTS | jq -r '.[] | select(.lifecycleEventName=="ValidateService") | .status')
          
            echo "status_download=$STATUS_DOWNLOAD" >> $GITHUB_OUTPUT
            echo "status_app_start=$STATUS_APP_START" >> $GITHUB_OUTPUT
            echo "status_validate=$STATUS_VALIDATE" >> $GITHUB_OUTPUT
          
            # 실패 시 상세 원인 추출
            if [ "$STATUS" != "Succeeded" ]; then
               ERROR_STEP=$(echo $EVENTS | jq -r '.[] | select(.status=="Failed") | .lifecycleEventName')
               echo "error_step=$ERROR_STEP" >> $GITHUB_OUTPUT
            fi
          else
            echo "status_download=Unknown" >> $GITHUB_OUTPUT
            echo "status_app_start=Unknown" >> $GITHUB_OUTPUT
            echo "status_validate=Unknown" >> $GITHUB_OUTPUT
          fi

      - name: Discord CD 결과 알림
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          status: ${{ steps.cd-check.outputs.status == 'Succeeded' && 'success' || 'failure' }}
          webhook: ${{ secrets.DISCORD_WEBHOOK_NON_PROD_URL }}
          title: "배포(CD) 결과 [${{ steps.cd-check.outputs.status == 'Succeeded' && '✅성공' || '❌실패' }}]"
          description: |
            **브랜치**: `${{ github.ref_name }}`
            **CodeDeploy ID**: `${{ needs.codedeploy.outputs.deployment_id }}`
            
            **📊 배포 상태**: ${{ steps.cd-check.outputs.status }}
            
            **🔍 상세 진행 단계**:
            - 아티팩트 다운로드: ${{ steps.cd-check.outputs.status_download == 'Succeeded' && '✅Pass' || (steps.cd-check.outputs.status_download == 'Failed' && '❌Fail' || '⏭️Skip/Wait') }}
            - 새 서비스 실행: ${{ steps.cd-check.outputs.status_app_start == 'Succeeded' && '✅Pass' || (steps.cd-check.outputs.status_app_start == 'Failed' && '❌Fail' || '⏭️Skip/Wait') }}
            - 검증/전환/종료: ${{ steps.cd-check.outputs.status_validate == 'Succeeded' && '✅Pass' || (steps.cd-check.outputs.status_validate == 'Failed' && '❌Fail' || '⏭️Skip/Wait') }}

            ${{ steps.cd-check.outputs.status != 'Succeeded' && format('**⚠️ 실패 단계**: {0}', steps.cd-check.outputs.error_step) || '' }}

          color: "${{ steps.cd-check.outputs.status == 'Succeeded' && 65280 || 16711680 }}"
          username: AWS CodeDeploy Bot
          avatar_url: https://d1.awsstatic.com/icons/console/CodeDeploy_Icon.4ab321a5b8b9b2b2b2b2b2b2b2b2b2b2b2b2b2b.png

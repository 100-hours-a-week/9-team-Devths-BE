name: Devths-BE 비운영용 CI 파이프라인

on:
  push:
    branches:
      - develop
      - release/*

permissions:
  contents: read

# 동시성 제어: 동일한 브랜치에 새로운 커밋이 오면 이전 워크플로우 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 공통 설정
  JAVA_VERSION: "21"
  USER_MAP_JSON: ${{ secrets.USER_MAP_JSON }}
  BRANCH_NAME: ${{ github.ref_name }}
  ENV_TYPE: ${{ startsWith(github.ref_name, 'release/') && '🧪 스테이징(STAGING)' || '🛠️ 개발(DEV)' }}

  # AWS 설정
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  ECR_TARGET_REPO: "devths/be-${{ startsWith(github.ref_name, 'release/') && 'stg' || 'dev'}}"

  # Discord 설정
  DISCORD_WEBHOOK_NON_PROD_URL: ${{ secrets.DISCORD_WEBHOOK_NON_PROD_URL }}
  DISCORD_AVATAR_URL: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png


jobs:
  # Lint 설정
  lint:
    name: lint
    runs-on: ubuntu-22.04
    if: ${{ !github.event.created }}
    permissions:
      contents: read
      checks: write
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 및 Gradle 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Lint (CheckStyle) 수행
        run: ./gradlew checkstyleMain

      - name: Lint (CheckStyle) 결과 리포트
        uses: lcollins/checkstyle-github-action@v2.0.0
        if: always()
        with:
          path: '**/build/reports/checkstyle/*.xml'
          title: 'Checkstyle 결과 Report'

  # CodeQL 기반 코드 정적 분석 실행
  static_analysis:
    runs-on: ubuntu-latest
    if: ${{ !github.event.created }}
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: true  # 정적 분석 실패 시 즉시 중단
      matrix:
        language: [ java-kotlin ]

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Java 및 Gradle 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: CodeQL 초기화
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: "./.github/codeql/code-ql-heavy.yml"

      - name: Build (Gradle)
        run: |
          chmod +x gradlew
          ./gradlew build -x test -x check

      - name: CodeQL 분석 수행
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true

      - name: 보안 취약점 결과 확인 및 차단
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "⏳ 분석 결과가 GitHub에 반영되기를 기다리는 중 (10초)..."
          sleep 10
          
          # 1. 현재 이벤트가 push인지 pr인지에 따라 검색할 REF 설정
          # GITHUB_REF는 push일 땐 refs/heads/branch명, PR일 땐 refs/pull/번호/merge가 됩니다.
          CURRENT_REF="${{ github.ref }}"
          echo "📍 현재 Ref: $CURRENT_REF"
          
          # 2. API 호출하여 High/Critical 등급의 Open 상태인 알림 조회
          ALERTS=$(gh api "repos/${{ github.repository }}/code-scanning/alerts?tool_name=CodeQL&state=open&ref=$CURRENT_REF" \
            --jq '[.[] | select(.rule.security_severity_level == "high" or .rule.security_severity_level == "critical")]')
          
          COUNT=$(echo "$ALERTS" | jq 'length')
          
          if [ "$COUNT" -gt 0 ]; then
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ 보안 검사 실패: 고위험(High/Critical) 취약점 $COUNT개 발견"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "$ALERTS" | jq -r '.[] | "- [\(.rule.security_severity_level)] \(.rule.description) \n   위치: \(.most_recent_instance.location.path)"'
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ 보안 검사 통과: 현재 커밋($CURRENT_REF)은 안전합니다."
          fi
  # 추후 통합 테스트 과정 추가 예정

  # 도커 이미지 생성 및 업로드
  build:
    name: build
    needs: [ lint, static_analysis ]
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    if: success()
    outputs:
      image_tag: ${{ steps.timestamp.outputs.image_tag }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ env.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 타임스탬프 기반 이미지 태그 생성
        id: timestamp
        run: |
          # SHA의 앞 7자리만 변수에 저장
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          # 날짜와 SHORT_SHA를 결합하여 OUTPUT에 저장
          IMAGE_TAG="$(date +'%Y%m%d_%H%M%S')-$SHORT_SHA"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: ECR 로그인
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 및 ECR 푸시
        env:
          IMAGE_TAG: ${{ steps.timestamp.outputs.image_tag }}
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_TARGET_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_TARGET_REPO }}:latest
          provenance: false


  # CI 단계
  notify-ci:
    name: notify-ci
    runs-on: ubuntu-22.04
    needs: [ lint, static_analysis, build ]
    if: always()&& !github.event.created
    steps:
      - name: Discord 빌드 알림
        uses: sarisia/actions-status-discord@v1
        with:
          status: ${{ (needs.lint.result == 'success' && needs.static_analysis.result == 'success' && needs.build.result == 'success') && 'success' || 'failure' }}
          # 타겟 브랜치에 따른 웹훅 분기
          webhook: ${{ env.DISCORD_WEBHOOK_NON_PROD_URL }}
          title: "배포(CI) 결과 [${{ (needs.lint.result == 'success' && needs.static_analysis.result == 'success' && needs.build.result == 'success') && '✅성공' || '❌실패' }}]"
          description: |
            **브랜치**: `${{ env.BRANCH_NAME }}`
            **환경**: ${{ env.ENV_TYPE }}

            **📊 상세 결과**:
            - Lint: ${{ needs.lint.result == 'success' && '✅' || '❌' }}
            - Static Analysis: ${{ needs.static_analysis.result == 'success' && '✅' || '❌' }}
            - Build: ${{ needs.build.result == 'success' && '✅' || '❌' }}

            **🐳 Docker 이미지**: `${{ needs.build.outputs.image_tag }}`

            **📌 다음 단계**: ArgoCD에서 배포가 진행됩니다. 배포 결과는 ArgoCD 알림을 확인해주세요.

            **🔗 링크**: [커밋 확인하기](${{ github.event.repository.html_url }}/commit/${{ github.sha }})

          color: "${{ (needs.lint.result == 'success' && needs.static_analysis.result == 'success' && needs.build.result == 'success') && 65280 || 16711680 }}"
          username: GitHub BE NonProd Merge Bot
          avatar_url: ${{ env.DISCORD_AVATAR_URL }}
